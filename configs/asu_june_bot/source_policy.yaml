# Source policy for Asu June Bot.

allowed_by_default:
  - project_doc
  - meeting_artifact
  - analytical_note
  - instruction

weights:
  project_doc: 1.0
  meeting_artifact: 0.9
  analytical_note: 0.82
  instruction: 0.82
  system_export: 0.12
  runtime_export: 0.1
  code: 0.25
  unknown: 0.5

document_type_weights:
  ФТТ: 1.25
  ЦТА: 1.22
  ПР: 1.18
  СоИ AD: 1.16
  СоИ Справочники: 1.16
  Паспорт ИС: 1.12
  ПМИ: 1.08
  Руководство: 0.98
  Протокол: 0.92
  Реестр НСИ: 0.88
  BPMN / Процесс: 0.84
  API: 0.8
  Wiki: 0.72

explicit_enable_markers:
  system_export:
    - система
    - системная выгрузка
    - админка
    - django admin
    - asu_admin_export
    - asu_docs_export
    - site_review
    - html export
    - экспорт сайта
    - интерфейс
    - страница
    - токен
    - пользователь
    - роль
  code:
    - код
    - скрипт
    - python
    - powershell
    - ошибка в скрипте
