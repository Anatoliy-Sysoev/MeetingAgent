project_root: "%USERPROFILE%/Desktop/PROJECT_DOCUMENTS"
work_root: "%USERPROFILE%/Desktop/AI/MeetingAgent"

ollama:
  base_url: "http://localhost:11434"
  embedding_model: "bge-m3"
  chat_model: "qwen3:8b"
  embedding_num_ctx: 8192
  keep_alive: "24h"

rag:
  search_backend: "numpy"
  chunk_size_chars: 3000
  chunk_overlap_chars: 300
  top_k: 12
  max_context_chars: 24000

generation:
  temperature: 0.2
  top_p: 0.9

transcription:
  model: "large-v3-turbo"
  language: "ru"
  compute_type: "int8"
  device: "cpu"
  beam_size: 5
  vad_filter: true

live_transcription:
  model: "small"
  language: "ru"
  compute_type: "int8"
  device: "cpu"
  chunk_sec: 5
  beam_size: 3
  vad_filter: false
  write_separate_mic_and_system_tracks: true

paths:
  manifest: "data/manifest.jsonl"
  extracted_text_dir: "data/extracted_text"
  chunks: "data/chunks.jsonl"
  embeddings_cache: "data/embeddings_cache.jsonl"
  numpy_index: "data/numpy_index"
  # Устаревшая папка ChromaDB. Основной поиск и сборка RAG ее не используют.
  vector_db: "vector_db"
  logs: "logs"
  watched_folder: "watched_folder"

include_extensions:
  - ".docx"
  - ".pdf"
  - ".xlsx"
  - ".xlsb"
  - ".pptx"
  - ".md"
  - ".txt"
  - ".html"
  - ".json"
  - ".yml"
  - ".yaml"
  - ".drawio"
  - ".puml"
  - ".srt"
  - ".py"
  - ".js"
  - ".ts"
  - ".css"

exclude_dirs:
  - ".git"
  - "__pycache__"
  - "node_modules"
  - "_backup"
  - "backup"
  - "Архив"
  - "archive"
  - "_archive"
  - "Черновики и шаблоны"
  - "cache"
  - ".venv"
  - "dist"
  - "build"

exclude_path_patterns:
  - "_analysis/docx_json*/**"
  - "**/_analysis/docx_json*/**"
  - "_analysis/site_review*/**"
  - "**/_analysis/site_review*/**"
  - "_analysis/__pycache__/**"
  - "**/_analysis/__pycache__/**"
  - "_analysis/*.py"
  - "**/_analysis/*.py"
  - "_analysis/*.docx"
  - "**/_analysis/*.docx"
  - "_analysis/*.json"
  - "**/_analysis/*.json"
  - "**/Архив/**"
  - "**/Архив*/**"
  - "**/archive/**"
  - "**/archive*/**"
  - "**/_archive/**"
  - "**/_archive*/**"
  - "**/backup/**"
  - "**/backup*/**"
  - "**/_backup/**"
  - "**/_backup*/**"
  - "**/Черновики и шаблоны/**"
  - "**/_to_review*/**"

exclude_extensions:
  - ".pyc"
  - ".ttf"
  - ".zip"
  - ".rar"
  - ".mp4"
